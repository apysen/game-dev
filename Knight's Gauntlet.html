<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Knight's Gauntlet">
<title>Knight's Gauntlet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none;}
body{background:#1a1a2e;color:#eee;font-family:system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;justify-content:center;}
#screen{width:100%;max-width:400px;height:100dvh;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}
#canvas-wrap,#gc{touch-action:none;}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 16px 6px;z-index:10;flex-shrink:0;}
#hud .score{font-size:22px;font-weight:700;color:#f0c040;}
#hud .mode-badge{font-size:11px;background:#333;border-radius:12px;padding:4px 10px;color:#aaa;}
#hud-buttons{display:flex;gap:8px;}
#canvas-wrap{position:relative;flex:1;width:100%;overflow:hidden;}
#gc{display:block;width:100%;height:100%;}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(20,20,40,0.92);z-index:20;gap:16px;}
.overlay h1{font-size:32px;font-weight:800;color:#f0c040;letter-spacing:2px;text-align:center;}
.overlay h2{font-size:20px;font-weight:700;color:#f0c040;}
.overlay p{font-size:14px;color:#aaa;text-align:center;max-width:280px;line-height:1.6;}
.big{font-size:48px;}
.btn{background:#f0c040;color:#1a1a2e;border:none;border-radius:10px;padding:12px 28px;font-size:16px;font-weight:700;cursor:pointer;}
.btn-outline{background:transparent;color:#f0c040;border:2px solid #f0c040;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-sm{background:transparent;color:#f0c040;border:2px solid #f0c040;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;}
.mode-row{display:flex;gap:12px;}
.mode-btn{background:#16213e;color:#aaa;border:2px solid #333;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
.mode-btn.active{border-color:#f0c040;color:#f0c040;}
.diff-row{display:flex;gap:8px;}
.diff-btn{background:#16213e;color:#aaa;border:2px solid #333;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.diff-btn.active{border-color:#f0c040;color:#f0c040;}
.diff-section{display:flex;flex-direction:column;align-items:center;gap:6px;}
#lb-list{width:260px;padding:0;}
#lb-list li{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #333;font-size:13px;color:#ccc;list-style:none;}
#lb-list li:first-child{color:#f0c040;font-weight:700;}
.lb-tab{background:transparent;color:#aaa;border:1px solid #444;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;}
.lb-tab.active{border-color:#f0c040;color:#f0c040;}
#name-input{background:#16213e;border:2px solid #f0c040;border-radius:8px;padding:8px 14px;font-size:18px;color:#fff;text-align:center;width:160px;text-transform:uppercase;}
#name-input::placeholder{color:#555;}
</style>
</head>
<body>
<div id="screen">
  <div id="hud" style="display:none">
    <div class="score" id="score-display">0</div>
    <div class="mode-badge" id="mode-badge">TRAP MODE</div>
    <div id="hud-buttons">
      <button class="btn-sm" onclick="pauseGame()">&#10074;&#10074;</button>
      <button class="btn-sm" onclick="restartGame()">↺</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>

    <!-- MENU -->
    <div class="overlay" id="menu-screen">
      <div class="big">♞</div>
      <h1>KNIGHT'S<br>GAUNTLET</h1>
      <p>Move in L-shapes.<br>Survive the endless battlefield.</p>
      <div class="mode-row">
        <button class="mode-btn active" id="btn-trap" onclick="selectMode('trap')">⚔ Trap<br><span style="font-size:10px;font-weight:400;">Avoid obstacles</span></button>
        <button class="mode-btn" id="btn-battle" onclick="selectMode('battle')">♟ Battle<br><span style="font-size:10px;font-weight:400;">Capture enemies</span></button>
      </div>
      <div class="diff-section" id="diff-section">
        <p style="font-size:11px;color:#666;text-align:center;" id="diff-label">SCROLL SPEED</p>
        <div class="diff-row">
          <button class="diff-btn" id="diff-easy" onclick="selectDiff('easy')">🟢 Easy</button>
          <button class="diff-btn active" id="diff-medium" onclick="selectDiff('medium')">🟡 Medium</button>
          <button class="diff-btn" id="diff-hard" onclick="selectDiff('hard')">🔴 Hard</button>
        </div>
      </div>
      <button class="btn" onclick="startGame()">PLAY</button>
      <button class="btn-outline" onclick="showLeaderboard()">🏆 Leaderboard</button>
    </div>

    <!-- PAUSE -->
    <div class="overlay" id="pause-screen" style="display:none">
      <h2>PAUSED</h2>
      <button class="btn" onclick="resumeGame()">▶ Resume</button>
      <button class="btn-outline" onclick="restartGame()">↺ Restart</button>
      <button class="btn-outline" onclick="backToMenu()">⌂ Main Menu</button>
    </div>

    <!-- LEADERBOARD -->
    <div class="overlay" id="lb-screen" style="display:none">
      <h2>🏆 Leaderboard</h2>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center;margin-bottom:8px;">
        <div style="display:flex;gap:4px;align-items:center;">
          <span style="font-size:10px;color:#666;width:36px;text-align:right;margin-right:4px;">TRAP</span>
          <button class="lb-tab" id="lb-tab-trap-easy" onclick="showLBTab('trap-easy')">Easy</button>
          <button class="lb-tab" id="lb-tab-trap-medium" onclick="showLBTab('trap-medium')">Med</button>
          <button class="lb-tab" id="lb-tab-trap-hard" onclick="showLBTab('trap-hard')">Hard</button>
        </div>
        <div style="display:flex;gap:4px;align-items:center;">
          <span style="font-size:10px;color:#666;width:36px;text-align:right;margin-right:4px;">BATTLE</span>
          <button class="lb-tab" id="lb-tab-battle-easy" onclick="showLBTab('battle-easy')">Easy</button>
          <button class="lb-tab" id="lb-tab-battle-medium" onclick="showLBTab('battle-medium')">Med</button>
          <button class="lb-tab" id="lb-tab-battle-hard" onclick="showLBTab('battle-hard')">Hard</button>
        </div>
      </div>
      <ul id="lb-list"></ul>
      <button class="btn-outline" onclick="backToMenu()">← Back</button>
    </div>

    <!-- GAME OVER -->
    <div class="overlay" id="name-screen" style="display:none">
      <h2>GAME OVER</h2>
      <p id="final-score-txt" style="font-size:26px;font-weight:700;color:#f0c040;"></p>
      <p id="name-prompt">Enter your initials</p>
      <input type="text" id="name-input" maxlength="3" placeholder="AAA" autocomplete="off" spellcheck="false">
      <button class="btn" id="save-score-btn" onclick="submitScore()">SAVE SCORE</button>
      <div style="display:flex;gap:10px;">
        <button class="btn-outline" style="font-size:12px" onclick="backToMenu()">Home</button>
        <button class="btn-outline" style="font-size:12px" onclick="restartGame()">↺ Restart</button>
      </div>
    </div>
  </div>
</div>
<script>
var canvas, ctx, cellW, cellH;
var COLS = 5, ROWS = 10;
var mode = 'trap';
var difficulty = 'medium';
var gameState = 'menu';
var score = 0, trapScore = 0;
var animFrame = null, lastTime = null;
var pendingScore = 0, lbTab = 'trap-medium';
var scrollPx = 0, scrollSpeed = 62;
var playerCanvasY = 0, playerCol = 2;
var obstacles = [], popups = [];
var nextSpawnAt = 0, spawnIndex = 0;
var lastBattleMoveTime = 0, battleMoveInterval = 1500;

var TRAP_DIFF   = { easy:[70,180], medium:[110,240], hard:[150,300] };
var BATTLE_DIFF = { easy:2500, medium:1500, hard:800 };

var PIECE_TYPES = ['pawn','bishop','rook','queen'];
var PIECES = {
  pawn:   {sym:'♙', color:'#e05050'},
  bishop: {sym:'♝', color:'#9060e0'},
  rook:   {sym:'♜', color:'#4080e0'},
  queen:  {sym:'♛', color:'#e04080'},
  trap:   {sym:'✕', color:'#cc3333'}
};
var PIECE_POINTS = {pawn:1, bishop:3, rook:5, queen:10};
var L_DELTAS = [[-2,-1],[-2,1],[2,-1],[2,1],[-1,-2],[1,-2],[-1,2],[1,2]];

function getSavedName(){ return localStorage.getItem('kg_player_name')||''; }
function setSavedName(n){ localStorage.setItem('kg_player_name',n); }

// ── Audio ──────────────────────────────────────────────────────────────────
var audioCtx = null;
function unlockAudio(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
function playMoveSound(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var now=audioCtx.currentTime,sr=audioCtx.sampleRate;
    var bufSize=Math.floor(sr*0.15);
    var buf=audioCtx.createBuffer(1,bufSize,sr);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.025));
    var noise=audioCtx.createBufferSource(); noise.buffer=buf;
    var bp=audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=600; bp.Q.value=0.6;
    var shelf=audioCtx.createBiquadFilter(); shelf.type='highshelf'; shelf.frequency.value=3000; shelf.gain.value=-10;
    var g=audioCtx.createGain();
    g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    noise.connect(bp); bp.connect(shelf); shelf.connect(g); g.connect(audioCtx.destination);
    noise.start(now); noise.stop(now+0.15);
  }catch(e){}
}

// ── Init ───────────────────────────────────────────────────────────────────
function init(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  canvas.addEventListener('pointerdown',function(e){
    e.preventDefault(); unlockAudio(); handleTap(e);
  });
  document.addEventListener('visibilitychange',function(){
    if(document.hidden&&gameState==='playing') pauseGame();
  });
}

function resize(){
  var wrap=document.getElementById('canvas-wrap');
  canvas.width=wrap.clientWidth||window.innerWidth;
  canvas.height=wrap.clientHeight||window.innerHeight;
  cellW=canvas.width/COLS;
  cellH=canvas.height/ROWS;
}

function selectMode(m){
  mode=m;
  document.getElementById('btn-trap').classList.toggle('active',m==='trap');
  document.getElementById('btn-battle').classList.toggle('active',m==='battle');
  document.getElementById('diff-label').textContent=m==='trap'?'SCROLL SPEED':'ENEMY SPEED';
}

function selectDiff(d){
  difficulty=d;
  ['easy','medium','hard'].forEach(function(x){
    document.getElementById('diff-'+x).classList.toggle('active',x===d);
  });
}

function getLBKey(){ return mode+'-'+difficulty; }

// ── Start ──────────────────────────────────────────────────────────────────
function startGame(){
  resize(); hideAll();
  document.getElementById('hud').style.display='flex';
  var labels={easy:'Easy',medium:'Medium',hard:'Hard'};
  document.getElementById('mode-badge').textContent=(mode==='trap'?'TRAP':'BATTLE')+' · '+labels[difficulty];
  score=0; trapScore=0; scrollPx=0;
  scrollSpeed=mode==='trap'?TRAP_DIFF[difficulty][0]:70;
  battleMoveInterval=BATTLE_DIFF[difficulty];
  playerCol=2; playerCanvasY=canvas.height-4*cellH;
  obstacles=[]; popups=[];
  spawnIndex=0; lastBattleMoveTime=Date.now(); lastTime=null;
  for(var r=1;r<ROWS-1;r++) spawnRowAtCanvasY(playerCanvasY-r*cellH);
  nextSpawnAt=scrollPx+cellH;
  gameState='playing';
  updateHUD();
  if(animFrame) cancelAnimationFrame(animFrame);
  animFrame=requestAnimationFrame(loop);
}

function spawnRowAtCanvasY(cy){
  if(mode==='trap'){
    var progress=Math.min(1,scrollPx/(cellH*40));
    var numOpen=Math.random()<progress?2:3;
    var dcs=[-2,-1,1,2],reachable=[];
    for(var i=0;i<dcs.length;i++){var nc=playerCol+dcs[i];if(nc>=0&&nc<COLS)reachable.push(nc);}
    reachable.sort(function(){return Math.random()-0.5;});
    var open={};
    for(var k=0;k<Math.min(numOpen,reachable.length);k++) open[reachable[k]]=true;
    if(Object.keys(open).length<2&&reachable.length>=2){open[reachable[0]]=true;open[reachable[1]]=true;}
    for(var c=0;c<COLS;c++) if(!open[c]) obstacles.push({col:c,canvasY:cy,pieceType:'trap',alive:true});
  } else {
    if(Math.random()<0.55){
      var t=PIECE_TYPES[Math.floor(Math.random()*PIECE_TYPES.length)];
      obstacles.push({col:Math.floor(Math.random()*COLS),canvasY:cy,pieceType:t,alive:true,nextCol:null,diagDir:0});
    }
  }
  spawnIndex++;
}

function cellOccupied(col, canvasY, excludeIdx){
  for(var i=0;i<obstacles.length;i++){
    if(i===excludeIdx||!obstacles[i].alive) continue;
    if(obstacles[i].col===col&&Math.abs(obstacles[i].canvasY-canvasY)<cellH*0.5) return true;
  }
  return false;
}

// ── Loop ───────────────────────────────────────────────────────────────────
function loop(ts){
  if(gameState!=='playing') return;
  animFrame=requestAnimationFrame(loop);
  var dt=lastTime?Math.min((ts-lastTime)/1000,0.1):0.016;
  lastTime=ts;
  update(dt); render();
}

function update(dt){
  var delta=scrollSpeed*dt;
  scrollPx+=delta;
  if(mode==='trap'){
    scrollSpeed=Math.min(TRAP_DIFF[difficulty][1],TRAP_DIFF[difficulty][0]+scrollPx*0.01);
  }
  playerCanvasY+=delta;
  for(var i=0;i<obstacles.length;i++) obstacles[i].canvasY+=delta;
  for(var pi=0;pi<popups.length;pi++) popups[pi].canvasY+=delta;
  for(var p=popups.length-1;p>=0;p--){
    popups[p].alpha-=dt*1.8;
    if(popups[p].alpha<=0) popups.splice(p,1);
  }
  while(scrollPx>=nextSpawnAt){ spawnRowAtCanvasY(-cellH); nextSpawnAt+=cellH; }
  obstacles=obstacles.filter(function(o){return o.alive&&o.canvasY<canvas.height+cellH;});

  if(mode==='battle'){
    var now=Date.now();
    if(now-lastBattleMoveTime>=battleMoveInterval){
      lastBattleMoveTime=now;
      var dead=false;
      for(var j=0;j<obstacles.length;j++){
        var o=obstacles[j];
        if(!o.alive) continue;

        if(o.pieceType==='rook'){
          var rookNextY=o.canvasY+cellH;
          var rookBlocked=cellOccupied(o.col,rookNextY,j)||(o.col===playerCol&&Math.abs(rookNextY-playerCanvasY)<cellH*0.5);
          if(!rookBlocked){
            o.canvasY=rookNextY;
          } else {
            // Try moving sideways (left or right) instead, staying on same row
            var sideOptions=[-1,1].sort(function(){return Math.random()-0.5;});
            var moved=false;
            for(var si=0;si<sideOptions.length;si++){
              var sc=o.col+sideOptions[si];
              if(sc<0||sc>=COLS) continue;
              var sideBlocked=cellOccupied(sc,o.canvasY,j)||(sc===playerCol&&Math.abs(o.canvasY-playerCanvasY)<cellH*0.5);
              if(!sideBlocked){ o.col=sc; moved=true; break; }
            }
            // If sideways also blocked, stay put this tick
          }
        }
        else if(o.pieceType==='pawn'){
          // Check threat BEFORE moving: does the player sit in this pawn's current
          // diagonal-threat zone (one row ahead, one col to either side)?
          var preThreatY=o.canvasY+cellH;
          var inThreatZone = Math.abs(preThreatY-playerCanvasY)<cellH*0.5 &&
                              (playerCol===o.col-1||playerCol===o.col+1);
          if(inThreatZone){
            dead=true;
          } else {
            var pawnNextY=o.canvasY+cellH;
            var pawnBlocked=cellOccupied(o.col,pawnNextY,j)||(o.col===playerCol&&Math.abs(pawnNextY-playerCanvasY)<cellH*0.5);
            if(!pawnBlocked) o.canvasY=pawnNextY;
          }
        }
        else if(o.pieceType==='bishop'){
          if(o.nextCol!==null) o.col=o.nextCol;
          var bdc=o.diagDir||(Math.random()<0.5?1:-1);
          var nextC=o.col+bdc;
          if(nextC<0||nextC>=COLS){ bdc=-bdc; nextC=o.col+bdc; }
          var bishopNextY=o.canvasY+cellH;
          if(cellOccupied(nextC,bishopNextY,j)){
            bdc=-bdc; nextC=o.col+bdc;
            if(nextC<0||nextC>=COLS||cellOccupied(nextC,bishopNextY,j)) nextC=o.col;
          }
          o.diagDir=bdc;
          o.nextCol=nextC;
          o.canvasY=bishopNextY;
        }
        else if(o.pieceType==='queen'){
          if(o.nextCol!==null) o.col=o.nextCol;
          var qdc=Math.random()<0.5?1:-1;
          var qNextCol=Math.max(0,Math.min(COLS-1,o.col+qdc));
          var queenNextY=o.canvasY+cellH;
          if(cellOccupied(qNextCol,queenNextY,j)) qNextCol=o.col;
          o.nextCol=qNextCol;
          o.canvasY=queenNextY;
        }

        if(o.col===playerCol&&Math.abs(o.canvasY-playerCanvasY)<cellH*0.5) dead=true;
      }
      if(dead){ loseLife(); return; }
    }
  }

  if(playerCanvasY>canvas.height+cellH){ loseLife(); return; }
  checkCollision();
  updateHUD();
}

function checkCollision(){
  for(var i=0;i<obstacles.length;i++){
    var o=obstacles[i];
    if(!o.alive) continue;
    if(o.col===playerCol&&Math.abs(o.canvasY-playerCanvasY)<cellH*0.5){ loseLife(); return; }
  }
}
function loseLife(){
  gameState='dead';
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  pendingScore=score;
  document.getElementById('hud').style.display='none';
  document.getElementById('final-score-txt').textContent='Score: '+score;
  var savedName=getSavedName();
  if(savedName){
    saveScore(getLBKey(),savedName,pendingScore);
    document.getElementById('name-prompt').style.display='none';
    document.getElementById('name-input').style.display='none';
    document.getElementById('save-score-btn').style.display='none';
  } else {
    document.getElementById('name-prompt').style.display='';
    document.getElementById('name-input').style.display='';
    document.getElementById('save-score-btn').style.display='';
    document.getElementById('name-input').value='';
  }
  showScreen('name-screen');
}

function getValidMoves(){
  var moves=[];
  for(var i=0;i<L_DELTAS.length;i++){
    var nc=playerCol+L_DELTAS[i][0];
    var ny=playerCanvasY+L_DELTAS[i][1]*cellH;
    if(nc<0||nc>=COLS) continue;
    if(ny>canvas.height+cellH) continue;
    var blocked=false;
    for(var j=0;j<obstacles.length;j++){
      var o=obstacles[j]; if(!o.alive) continue;
      if(o.col===nc&&Math.abs(o.canvasY-ny)<cellH*0.5){
        if(mode==='battle'&&o.pieceType!=='trap'){}
        else{ blocked=true; break; }
      }
    }
    if(!blocked) moves.push({col:nc,canvasY:ny});
  }
  return moves;
}

function handleTap(e){
  if(gameState!=='playing') return;
  var rect=canvas.getBoundingClientRect();
  var tx=e.clientX-rect.left,ty=e.clientY-rect.top;
  var tc=Math.floor(tx/cellW);
  var moves=getValidMoves();
  var move=null,bestDist=cellH*1.2;
  for(var i=0;i<moves.length;i++){
    var mv=moves[i];
    if(mv.col!==tc) continue;
    var dist=Math.abs(mv.canvasY-ty);
    if(dist<bestDist){ bestDist=dist; move=mv; }
  }
  if(!move) return;
  if(mode==='battle'){
    for(var j=0;j<obstacles.length;j++){
      var o=obstacles[j];
      if(o.alive&&o.pieceType!=='trap'&&o.col===move.col&&Math.abs(o.canvasY-move.canvasY)<cellH*0.5){
        o.alive=false;
        var pts=PIECE_POINTS[o.pieceType]||1; score+=pts;
        popups.push({col:move.col,canvasY:move.canvasY-cellH*0.3,text:'+'+pts,alpha:1});
      }
    }
  }
  if(mode==='trap'){
    var rowDelta=Math.round((playerCanvasY-move.canvasY)/cellH);
    trapScore=Math.max(0,trapScore+rowDelta);
    score=trapScore;
  }
  playerCol=move.col; playerCanvasY=move.canvasY;
  playMoveSound();
  checkCollision();
  updateHUD();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var tileOffset=scrollPx%cellH,baseRow=Math.floor(scrollPx/cellH);

  for(var r=-1;r<=ROWS+1;r++){
    var ry=r*cellH+tileOffset,worldRow=baseRow+r;
    for(var c=0;c<COLS;c++){
      ctx.fillStyle=(worldRow+c)%2===0?'#2d2d4e':'#1e1e35';
      ctx.fillRect(c*cellW,ry,cellW,cellH);
    }
  }

  var moves=getValidMoves();
  for(var vi=0;vi<moves.length;vi++){
    var mv=moves[vi];
    if(mv.canvasY>canvas.height) continue;
    var danger=Math.max(0,Math.min(1,mv.canvasY/canvas.height));
    var rr=Math.round(240+(255-240)*danger),gg=Math.round(192+(255-192)*danger),bb=Math.round(64+(255-64)*danger);
    ctx.fillStyle='rgba('+rr+','+gg+','+bb+',0.25)';
    ctx.fillRect(mv.col*cellW,mv.canvasY,cellW,cellH);
    ctx.fillStyle='rgba('+rr+','+gg+','+bb+',0.7)';
    ctx.beginPath(); ctx.arc(mv.col*cellW+cellW/2,mv.canvasY+cellH/2,7,0,Math.PI*2); ctx.fill();
  }

  if(mode==='battle'){
    for(var pi=0;pi<obstacles.length;pi++){
      var po=obstacles[pi]; if(!po.alive) continue;
      if(po.pieceType==='pawn'){
        var threatY=po.canvasY+cellH;
        if(threatY>=-cellH&&threatY<=canvas.height){
          var threatCols=[po.col-1,po.col+1];
          for(var ti=0;ti<threatCols.length;ti++){
            var tc2=threatCols[ti];
            if(tc2<0||tc2>=COLS) continue;
            ctx.fillStyle='rgba(220,80,80,0.18)'; ctx.fillRect(tc2*cellW,threatY,cellW,cellH);
            ctx.strokeStyle='rgba(220,80,80,0.5)'; ctx.lineWidth=1.5;
            ctx.strokeRect(tc2*cellW+1,threatY+1,cellW-2,cellH-2);
          }
        }
      } else {
        var ny=po.canvasY+cellH;
        if(ny<-cellH||ny>canvas.height) continue;
        var nc=po.col;
        if((po.pieceType==='bishop'||po.pieceType==='queen')&&po.nextCol!==null) nc=po.nextCol;
        ctx.fillStyle='rgba(220,80,80,0.18)'; ctx.fillRect(nc*cellW,ny,cellW,cellH);
        ctx.strokeStyle='rgba(220,80,80,0.5)'; ctx.lineWidth=1.5;
        ctx.strokeRect(nc*cellW+1,ny+1,cellW-2,cellH-2);
      }
    }
  }

  var fs=Math.round(cellW*0.55);
  for(var oi=0;oi<obstacles.length;oi++){
    var ob=obstacles[oi]; if(!ob.alive) continue;
    var oy=ob.canvasY; if(oy<-cellH||oy>canvas.height) continue;
    ctx.fillStyle=ob.pieceType==='trap'?'rgba(200,50,50,0.35)':'rgba(80,80,180,0.35)';
    ctx.fillRect(ob.col*cellW,oy,cellW,cellH);
    ctx.fillStyle=PIECES[ob.pieceType].color;
    ctx.font='bold '+fs+'px "Times New Roman","Noto Sans Symbols 2","Segoe UI Symbol",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(PIECES[ob.pieceType].sym,ob.col*cellW+cellW/2,oy+cellH/2+2);
  }

  var py=playerCanvasY;
  ctx.fillStyle='rgba(240,192,64,0.2)'; ctx.fillRect(playerCol*cellW,py,cellW,cellH);
  ctx.shadowColor='#f0c040'; ctx.shadowBlur=14; ctx.fillStyle='#f0c040';
  ctx.font='bold '+Math.round(cellW*0.62)+'px "Times New Roman","Noto Sans Symbols 2","Segoe UI Symbol",serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('♞',playerCol*cellW+cellW/2,py+cellH/2+2);
  ctx.shadowBlur=0;

  for(var pp=0;pp<popups.length;pp++){
    var p=popups[pp];
    ctx.globalAlpha=Math.max(0,p.alpha); ctx.fillStyle='#f0c040';
    ctx.font='bold '+Math.round(cellW*0.35)+'px system-ui';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.text,p.col*cellW+cellW/2,p.canvasY);
  }
  ctx.globalAlpha=1;

  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.5;
  for(var c2=1;c2<COLS;c2++){ctx.beginPath();ctx.moveTo(c2*cellW,0);ctx.lineTo(c2*cellW,canvas.height);ctx.stroke();}
  for(var r2=-1;r2<=ROWS+1;r2++){var ly=r2*cellH+tileOffset;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(canvas.width,ly);ctx.stroke();}

  if(mode==='battle'&&gameState==='playing'){
    var elapsed=Date.now()-lastBattleMoveTime;
    var prog=Math.min(1,elapsed/battleMoveInterval);
    var barW=canvas.width*0.55,barH=6,barX=(canvas.width-barW)/2,barY=canvas.height-10;
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,3); ctx.fill();
    var r3=prog<0.5?Math.round(prog*2*240):240;
    var g3=prog<0.5?200:Math.round(200*(1-(prog-0.5)*2));
    ctx.fillStyle='rgb('+r3+','+g3+',50)';
    ctx.beginPath(); ctx.roundRect(barX,barY,barW*prog,barH,3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font='9px system-ui'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('ENEMY MOVE',canvas.width/2,barY-2);
  }
}

// ── HUD & flow ─────────────────────────────────────────────────────────────
function updateHUD(){ document.getElementById('score-display').textContent=score; }

function pauseGame(){
  if(gameState!=='playing') return;
  gameState='paused';
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  showScreen('pause-screen');
}
function resumeGame(){
  document.getElementById('pause-screen').style.display='none';
  gameState='playing'; lastTime=null;
  lastBattleMoveTime=Date.now()-(battleMoveInterval*0.5);
  animFrame=requestAnimationFrame(loop);
}
function restartGame(){ startGame(); }

// ── Leaderboard ────────────────────────────────────────────────────────────
function getScores(key){try{return JSON.parse(localStorage.getItem('kg_'+key)||'[]');}catch(e){return[];}}
function saveScore(key,name,s){
  var arr=getScores(key);
  arr.push({name:(name||'???').toUpperCase().slice(0,3),score:s});
  arr.sort(function(a,b){return b.score-a.score;});
  localStorage.setItem('kg_'+key,JSON.stringify(arr.slice(0,10)));
}
function submitScore(){
  var name=(document.getElementById('name-input').value.trim()||'AAA').toUpperCase().slice(0,3);
  setSavedName(name);
  saveScore(getLBKey(),name,pendingScore);
  backToMenu();
}
function showLeaderboard(){
  hideAll(); lbTab=getLBKey();
  document.querySelectorAll('.lb-tab').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('lb-tab-'+lbTab); if(el) el.classList.add('active');
  renderLB(); showScreen('lb-screen');
}
function showLBTab(key){
  lbTab=key;
  document.querySelectorAll('.lb-tab').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('lb-tab-'+key); if(el) el.classList.add('active');
  renderLB();
}
function renderLB(){
  var scores=getScores(lbTab),ul=document.getElementById('lb-list');
  ul.innerHTML='';
  if(!scores.length){ul.innerHTML='<li style="color:#555;list-style:none">No scores yet</li>';return;}
  for(var i=0;i<scores.length;i++){
    var li=document.createElement('li');
    li.innerHTML='<span>'+(i+1)+'. '+scores[i].name+'</span><span>'+scores[i].score+'</span>';
    ul.appendChild(li);
  }
}
function backToMenu(){hideAll();showScreen('menu-screen');}
function showScreen(id){document.getElementById(id).style.display='flex';}
function hideAll(){
  ['menu-screen','pause-screen','lb-screen','name-screen'].forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('hud').style.display='none';
}
window.addEventListener('load',init);
</script>
